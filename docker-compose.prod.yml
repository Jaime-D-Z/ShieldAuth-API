version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: auth_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: auth-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      CLIENT_URL: http://localhost:3000
      DATABASE_URL: postgresql://auth_user:auth_password@postgres:5432/auth_db?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_me_super_long_access_secret_123456789
      JWT_REFRESH_SECRET: change_me_super_long_refresh_secret_123456789
    ports:
      - "3000:3000"
    command: sh -c "npx prisma db push && npm start"

volumes:
  postgres_data:
  redis_data:
